services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: crypto-timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data

  delta-sync:
    build:
      context: .
      dockerfile: delta-sync/Dockerfile
    container_name: crypto-delta-sync
    depends_on:
      - timescaledb
    env_file:
      - .env
    volumes:
      - ./data_platform/medallion:/app/medallion

  dashboard-api:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile
    container_name: crypto-dashboard-api
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb
    env_file:
      - .env

volumes:
  kafka-data:
  timescaledb-data:
