# .github/workflows/cd.yml

name: CD - Deploy

on:
  workflow_run:
    workflows: ["CI - Build & Push Images"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Go to project
        run: cd ~/cryptoquant

      - name: Pull latest code
        run: |
          cd ~/cryptoquant
          git pull origin main

      # IMPORTANT
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Pull new images
      - name: Pull images
        run: |
          cd ~/cryptoquant
          docker compose pull

      # FORCE recreate containers
      - name: Deploy containers
        run: |
          cd ~/cryptoquant
          docker compose up -d --force-recreate

      # Health check (retry)
      - name: Check API
        run: |
          for i in {1..10}; do
            curl -f http://localhost:8000/docs && exit 0
            sleep 5
          done
          exit 1

      # Wait for Airflow
      - name: Wait for Airflow
        run: |
          for i in {1..12}; do
            curl -f http://localhost:8080/health && exit 0
            sleep 10
          done
          exit 1

      # Trigger DAG
      - name: Trigger training DAG
        run: |
          curl -X POST "http://localhost:8080/api/v1/dags/model_training_pipeline/dagRuns" \
          -u "admin:admin" \
          -H "Content-Type: application/json" \
          -d '{}'