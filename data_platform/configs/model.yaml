    'imbalance_ratio',
    'buy_ratio',

    # lags
    'log_return_lag1',
    'log_return_lag2',
    'buy_ratio_lag1',

    # moving averages
    'ma_5',
    'ma_20',
    'ma_50',

    # rolling stats
    'volatility_5',
    'volume_5',
    'buy_ratio_5',
    'volatility_std_10',

