# configs/model.yaml

expected_columns : [
    'open_time',
    'symbol',

    'open',
    'high',
    'low',
    'close',
    'volume',
    'trades',
    'taker_buy_base',
    
    'log_return',
    'volatility',

    'imbalance_ratio',
    'buy_ratio',
    
    'log_return_lag1',
    'log_return_lag2',
    'buy_ratio_lag1',

    'ma_5',
    'ma_20',

    'volatility_5',
    'volume_5',
    'buy_ratio_5',

    'momentum',
    'volume_spike',
    'price_range_ratio',
    'body_size',

    'hour',
    'day_of_week',
    
    'trend_strength',
    'volatility_ratio'
]

features : [
    'symbol',

    'open',
    'high',
    'low',
    'close',
    'volume',
    'trades',
    'taker_buy_base',
    
    'log_return',
    'volatility',

    'imbalance_ratio',
    'buy_ratio',
    
    'log_return_lag1',
    'log_return_lag2',
    'buy_ratio_lag1',

    'ma_5',
    'ma_20',

    'volatility_5',
    'volume_5',
    'buy_ratio_5',

    'momentum',
    'volume_spike',
    'price_range_ratio',
    'body_size',

    'hour',
    'day_of_week',
    
    'trend_strength',
    'volatility_ratio'
]

target: "log_return_lead1"

test_split_ratio: 0.2

train_data_path: "models/artifacts/train_data.parquet"

model_params:
    xgboost:
        n_estimators: 100        # ↓ reduce
        max_depth: 5
        learning_rate: 0.05
        subsample: 0.8
        colsample_bytree: 0.8
        n_jobs: 1
        random_state: 42

    catboost:
        iterations: 100          # ↓ reduce
        learning_rate: 0.05
        depth: 6
        loss_function: RMSE
        verbose: False
        random_state: 42

    lightgbm:
        n_estimators: 100        # ↓ reduce
        learning_rate: 0.05
        num_leaves: 31
        n_jobs: 1
        random_state: 42

model_name: "crypto-return-predictor"

monitoring:
    drift:
        recent_window: 5000
        baseline_window: 20000
        min_rows: 200
        psi_bins: 10
        data_drift_threshold: 0.20
        prediction_drift_threshold: 0.25
        rmse_increase_threshold: 0.15

    retraining:
        airflow_api_url: "http://airflow-webserver:8080/api/v1"
        dag_id: "model_training_pipeline"
        username: "airflow"
        password: "airflow"
        cooldown_minutes: 30
        state_path: "/opt/app/delta/state/monitoring/retraining_state.json"

    scheduler:
        interval_minutes: 5

    metrics:
        namespace: "cryptoquant"
        pushgateway_url: "http://pushgateway:9091"
        job_name: "drift_monitor"

    history:
        path: "/opt/app/delta/state/monitoring/drift_history"