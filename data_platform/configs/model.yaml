features : [
    'symbol',

    # returns
    'log_return',
    'log_return_lag1',
    'log_return_lag2',
    'return_5',
    'return_20',

    # volatility
    'volatility',
    'volatility_5',
    'volatility_std_10',
    'volatility_ratio',

    # microstructure
    'imbalance_ratio',
    'imbalance_change',
    'buy_ratio',
    'buy_ratio_5',
    'buy_ratio_lag1',

    # trend
    'ma_5',
    'ma_20',
    'ma_50',
    'trend_strength',
    'trend_long',

    # momentum
    'momentum_ratio',

    # volume dynamics
    'volume_spike',

    # price structure
    'body_size',
    'price_deviation',

    # interactions
    'volatility_momentum',

    # time encoding
    'hour_sin',
    'hour_cos'
