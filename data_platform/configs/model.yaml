target: "log_return_lead1"

targets:
  # Classification labels are raw and fixed:
  # 0 = negative / down move
  # 1 = neutral / flat move
  # 2 = positive / up move
  sign:
    threshold: 0.0002
    drop_neutral: false

models:
  return_short:
    type: regression
    horizon: short
    optimization_metric: rmse
    decay_days: 14
    time_split_days:
      train: 90
      val: 7
      test: 3

  return_long:
    type: regression
    horizon: 1d
    optimization_metric: rmse
    decay_days: 60
    time_split_days:
      train: 1095
      val: 30
      test: 7

  sign_short:
    type: classification
    horizon: short
    optimization_metric: f1
    class_weighting: balanced
    time_split_days:
      train: 120
      val: 14
      test: 7

  sign_long:
    type: classification
    horizon: 1d
    optimization_metric: f1
    class_weighting: balanced
    time_split_days:
      train: 1095
      val: 30
      test: 7

tuning:
  enabled: true
  n_trials: 5
  timeout_seconds: 900

training:
  decay_days: 30
  min_train_rows: 5000

optimization_metric: rmse

inference:
  confidence_threshold: 0.0002

train_data_path: "models/artifacts/train_data.parquet"

model_params:
    xgboost:
        n_estimators: 1200
       
        colsample_bytree: 0.8

        reg_alpha: 0.1
        reg_lambda: 1.5

        min_child_weight: 2
        gamma: 0.05

        tree_method: hist
        max_bin: 256

        grow_policy: lossguide
        max_leaves: 64

        # n_jobs: 6
        random_state: 42

    catboost:
        iterations: 1500

        l2_leaf_reg: 3

        bootstrap_type: Bernoulli
        subsample: 0.8
        rsm: 0.8

        grow_policy: SymmetricTree

        od_type: Iter
        od_wait: 100

        random_state: 42
        verbose: False

    lightgbm:
        n_estimators: 1200

        max_depth: -1

        min_data_in_leaf: 30

        subsample: 0.8

        reg_alpha: 0.1
        reg_lambda: 1.5

        max_bin: 255
        feature_fraction: 0.8
        bagging_freq: 1

        # n_jobs: 6
        random_state: 42


search_space:
  xgboost:
    max_depth: [4, 10]
    learning_rate: [0.01, 0.2]
    subsample: [0.6, 1.0]

  lightgbm:
    num_leaves: [31, 127]
    learning_rate: [0.01, 0.2]

  catboost:
    depth: [4, 10]
    learning_rate: [0.01, 0.2]

monitoring:
    drift:
        recent_window: 5000
        baseline_window: 200000
        min_rows: 200
        data_drift_threshold: 0.25
        model_drift_threshold: 0.25

    retraining:
        airflow_api_url: "http://airflow-webserver:8080/api/v1"
        dag_id: "model_training_pipeline"
        username: "airflow"
        password: "airflow"
        cooldown_minutes: 30
        state_path: "/opt/app/delta/state/monitoring/retraining_state.json"

    scheduler:
        interval_minutes: 5

    history:
        path: "/opt/app/delta/state/monitoring/drift_history"