    'symbol',

    'open',
    'high',
    'low',
    'close',
    'volume',
    'trades',
    'taker_buy_base',
    
    'log_return',
    'volatility',

    'imbalance_ratio',
    'buy_ratio',
    
    'log_return_lag1',
    'log_return_lag2',
    'buy_ratio_lag1',

    'ma_5',
    'ma_20',

    'volatility_5',
    'volume_5',
    'buy_ratio_5',

    'momentum',
    'volume_spike',
    'price_range_ratio',
    'body_size',

    'hour',
    'day_of_week',
    
    'trend_strength',
    'volatility_ratio'
]

features : [
    'symbol',

    'open',
    'high',
    'low',
    'close',
    'volume',
    'trades',
    'taker_buy_base',
    
    'log_return',
    'volatility',

    'imbalance_ratio',
    'buy_ratio',
    
    'log_return_lag1',
    'log_return_lag2',
    'buy_ratio_lag1',

    'ma_5',
    'ma_20',

    'volatility_5',
    'volume_5',
    'buy_ratio_5',

    'momentum',
    'volume_spike',
    'price_range_ratio',
    'body_size',

    'hour',
    'day_of_week',
    
    'trend_strength',
    'volatility_ratio'
]

target: "log_return_lead1"

test_split_ratio: 0.2

train_data_path: "models/artifacts/train_data.parquet"

model_params:
    xgboost:
        n_estimators: 300        # ↓ reduce
        max_depth: 5
        learning_rate: 0.05
        subsample: 0.8
        colsample_bytree: 0.8
        n_jobs: 1
        random_state: 42
    
    random_forest:
        n_estimators: 50
        max_depth: 10
        min_samples_split: 10
        min_samples_leaf: 5
        max_features: "sqrt"
        n_jobs: 1
        random_state: 42

    catboost:
        iterations: 200          # ↓ reduce
        learning_rate: 0.05
        depth: 6
        loss_function: RMSE
        verbose: False
        random_state: 42

    lightgbm:
        n_estimators: 300        # ↓ reduce
        learning_rate: 0.05
        num_leaves: 31
        n_jobs: 1
        random_state: 42

    svr:
        kernel: rbf
        C: 0.5                  # ↓ safer
        gamma: 0.1
        epsilon: 0.01

model_name: "model_xgboost"