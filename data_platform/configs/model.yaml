target: "log_return_lead1"

test_split_ratio: 0.2

train_data_path: "models/artifacts/train_data.parquet"

model_params:
    xgboost:
        n_estimators: 800
        max_depth: 5
        learning_rate: 0.02
        subsample: 0.7
        colsample_bytree: 0.7
        reg_alpha: 0.5
        reg_lambda: 1.0
        tree_method: hist
        min_child_weight: 5
        gamma: 0.1
        n_jobs: 1
        random_state: 42

    catboost:
        iterations: 1000
        learning_rate: 0.02
        depth: 5
        l2_leaf_reg: 5
        loss_function: RMSE
        eval_metric: RMSE
        bootstrap_type: Bernoulli
        subsample: 0.7
        rsm: 0.7
        od_type: Iter
        od_wait: 100
        verbose: False
        random_state: 42

    lightgbm:
        n_estimators: 800
        learning_rate: 0.03
        num_leaves: 31
        max_depth: -1
        min_data_in_leaf: 50
        subsample: 0.7
        colsample_bytree: 0.7
        reg_alpha: 0.5
        reg_lambda: 1.0
        n_jobs: 1
        random_state: 42

model_name: "crypto-return-predictor"

monitoring:
    drift:
        recent_window: 5000
        baseline_window: 200000
        min_rows: 200
        data_drift_threshold: 0.25
        model_drift_threshold: 0.25

    retraining:
        airflow_api_url: "http://airflow-webserver:8080/api/v1"
        dag_id: "model_training_pipeline"
        username: "airflow"
        password: "airflow"
        cooldown_minutes: 30
        state_path: "/opt/app/delta/state/monitoring/retraining_state.json"

    scheduler:
        interval_minutes: 5

    history:
        path: "/opt/app/delta/state/monitoring/drift_history"