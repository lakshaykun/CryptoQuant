target: "log_return_lead1"

targets:
  # Classification labels are raw and fixed:
  # 0 = negative / down move
  # 1 = neutral / flat move
  # 2 = positive / up move
  sign:
    threshold: 0.0015
    drop_neutral: false

models:
  return_short:
    type: regression
    horizon: short
    optimization_metric: rmse
    decay_days: 14
    time_split_days:
      train: 90
      val: 7
      test: 3

  return_long:
    type: regression
    horizon: 1d
    optimization_metric: rmse
    decay_days: 60
    time_split_days:
      train: 1095
      val: 30
      test: 7

  sign_short:
    type: classification
    horizon: short
    optimization_metric: f1
    class_weighting: balanced
    time_split_days:
      train: 120
      val: 14
      test: 7

  sign_long:
    type: classification
    horizon: 1d
    optimization_metric: f1
    class_weighting: balanced
    time_split_days:
      train: 1095
      val: 30
      test: 7

tuning:
  enabled: true
  n_trials: 2
  timeout_seconds: 900

training:
  decay_days: 30
  min_train_rows: 5000

optimization_metric: rmse

inference:
  confidence_threshold: 0.0015

train_data_path: "models/artifacts/train_data.parquet"

model_params:
  regression:
    xgboost:
      objective: reg:squarederror
      eval_metric: rmse
      n_estimators: 1200
      reg_alpha: 0.1
      min_child_weight: 2
      gamma: 0.05
      tree_method: hist
      max_bin: 256
      grow_policy: lossguide
      max_leaves: 15
      random_state: 42

    catboost:
      loss_function: RMSE
      eval_metric: RMSE
      iterations: 1500
      bootstrap_type: Bernoulli
      subsample: 0.8
      rsm: 0.8
      grow_policy: SymmetricTree
      od_type: Iter
      od_wait: 100
      random_state: 42
      verbose: False

    lightgbm:
      objective: regression
      metric: rmse
      n_estimators: 1200
      min_data_in_leaf: 30
      subsample: 0.8
      reg_alpha: 0.1
      max_bin: 255
      feature_fraction: 0.8
      bagging_freq: 1
      random_state: 42

  classification:
    xgboost:
      objective: multi:softprob
      eval_metric: mlogloss
      num_class: 3
      n_estimators: 1200
      reg_alpha: 0.1
      min_child_weight: 2
      gamma: 0.05
      tree_method: hist
      max_bin: 256
      grow_policy: lossguide
      max_leaves: 15
      random_state: 42

    catboost:
      loss_function: MultiClass
      eval_metric: MultiClass
      iterations: 1500
      bootstrap_type: Bernoulli
      subsample: 0.8
      rsm: 0.8
      grow_policy: SymmetricTree
      od_type: Iter
      od_wait: 100
      random_state: 42
      verbose: False

    lightgbm:
      objective: multiclass
      metric: multi_logloss
      num_class: 3
      n_estimators: 1200
      min_data_in_leaf: 30
      subsample: 0.8
      reg_alpha: 0.1
      max_bin: 255
      feature_fraction: 0.8
      bagging_freq: 1
      random_state: 42


search_space:
  regression:
    xgboost:
      max_depth: [2, 5]
      learning_rate: [0.01, 0.2]
      subsample: [0.6, 1.0]
      colsample_bytree: [0.6, 1.0]
      reg_lambda: [10, 100]

    lightgbm:
      num_leaves: [7, 31]
      learning_rate: [0.01, 0.2]
      feature_fraction: [0.6, 1.0]
      reg_lambda: [10, 100]

    catboost:
      depth: [2, 5]
      learning_rate: [0.01, 0.2]
      l2_leaf_reg: [10, 100]

  classification:
    xgboost:
      max_depth: [2, 5]
      learning_rate: [0.01, 0.2]
      subsample: [0.6, 1.0]
      colsample_bytree: [0.6, 1.0]
      reg_lambda: [10, 100]

    lightgbm:
      num_leaves: [7, 31]
      learning_rate: [0.01, 0.2]
      feature_fraction: [0.6, 1.0]
      reg_lambda: [10, 100]

    catboost:
      depth: [2, 5]
      learning_rate: [0.01, 0.2]
      l2_leaf_reg: [10, 100]

monitoring:
    drift:
        recent_window: 5000
        baseline_window: 200000
        min_rows: 200
        data_drift_threshold: 0.25
        model_drift_threshold: 0.25

    retraining:
        airflow_api_url: "http://airflow-webserver:8080/api/v1"
        dag_id: "model_training_pipeline"
        username: "airflow"
        password: "airflow"
        cooldown_minutes: 30
        state_path: "/opt/app/delta/state/monitoring/retraining_state.json"

    scheduler:
        interval_minutes: 5

    history:
        path: "/opt/app/delta/state/monitoring/drift_history"