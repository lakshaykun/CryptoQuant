# configs/spark.yaml

app_name: CryptoQuant

master: local[*]

spark:
  app_name: btc-sentiment-platform
  master: local[*]

streaming:
  silver_trigger_seconds: 10
  gold_trigger_seconds: 10

gold:
  window_seconds: 60
  watermark_seconds: 180
  cron_minutes: 1
  sentiment_endpoint: http://127.0.0.1:8000/predict
  sentiment_timeout_seconds: 10

delta:
  bronze: delta/bronze
  silver: delta/silver
  gold: delta/gold

checkpoints:
  bronze: delta/checkpoint/bronze
  silver: delta/checkpoint/silver
  gold: delta/checkpoint/gold

kafka:
  bootstrap_servers: localhost:9092
  subscribe: btc_reddit,btc_yt,btc_news,btc_telegram
  starting_offsets: latest
  fail_on_data_loss: false

spark_configs:
  # Delta Lake
  spark.sql.extensions: io.delta.sql.DeltaSparkSessionExtension
  spark.sql.catalog.spark_catalog: org.apache.spark.sql.delta.catalog.DeltaCatalog

  # Performance (local optimized)
  spark.sql.shuffle.partitions: 8
  spark.default.parallelism: 8

  # Adaptive Query Execution
  spark.sql.adaptive.enabled: true
  spark.sql.adaptive.coalescePartitions.enabled: true

  # Storage
  spark.sql.warehouse.dir: /tmp/spark-warehouse

  # Arrow (faster pandas ↔ spark)
  spark.sql.execution.arrow.pyspark.enabled: true

  # Logging / Debugging
  spark.ui.enabled: true