services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: crypto-kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ../infra/kafka/create_topics.sh:/opt/bootstrap/create_topics.sh:ro
    environment:
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@crypto-kafka:9093

      KAFKA_LISTENERS: INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_LOG_DIRS: /var/lib/kafka/data

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka_bootstrap:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    volumes:
      - ../infra/kafka/create_topics.sh:/opt/bootstrap/create_topics.sh:ro
    command: ["/bin/sh", "/opt/bootstrap/create_topics.sh"]
    restart: "no"

  model_server:
    build:
      context: ..
      dockerfile: docker/model_server.Dockerfile
    env_file:
      - ../configs/app.env
    ports:
      - "8000:8000"
    depends_on:
      kafka_bootstrap:
        condition: service_completed_successfully

volumes:
  kafka-data: