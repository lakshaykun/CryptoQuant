global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: spark-streaming
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["spark-streaming:4040"]

  - job_name: spark-predictions
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["spark-predictions:4040"]

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: airflow-statsd
    static_configs:
      - targets: ["airflow-statsd-exporter:9102"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
