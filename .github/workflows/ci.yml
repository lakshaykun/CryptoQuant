# .github/workflows/ci.yml

name: CI - Build & Push Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔍 Detect changed files (robust)
      - name: Get changed files
        id: changes
        run: |
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "First commit or unknown base → build everything"

            echo "api=true" >> $GITHUB_OUTPUT
            echo "dashboard=true" >> $GITHUB_OUTPUT
            echo "stream=true" >> $GITHUB_OUTPUT
            echo "spark=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

            echo "Changed files:"
            echo "$CHANGED"

            echo "api=$(echo "$CHANGED" | grep '^api/' || true)" >> $GITHUB_OUTPUT
            echo "dashboard=$(echo "$CHANGED" | grep '^dashboard/' || true)" >> $GITHUB_OUTPUT
            echo "stream=$(echo "$CHANGED" | grep '^pipelines/ingestion/streaming/' || true)" >> $GITHUB_OUTPUT
            echo "spark=$(echo "$CHANGED" | grep '^docker/spark/' || true)" >> $GITHUB_OUTPUT
          fi

      # 🔐 Login only if needed
      - name: Login to Docker Hub
        if: |
          steps.changes.outputs.api != '' ||
          steps.changes.outputs.dashboard != '' ||
          steps.changes.outputs.stream != '' ||
          steps.changes.outputs.spark != ''
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔹 API
      - name: Build & push API
        if: steps.changes.outputs.api != ''
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/crypto-api:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/crypto-api:${{ github.sha }} \
                       -f docker/api/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/crypto-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/crypto-api:${{ github.sha }}

      # 🔹 Dashboard
      - name: Build & push dashboard
        if: steps.changes.outputs.dashboard != ''
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/crypto-dashboard:latest \
                       -f docker/dashboard/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/crypto-dashboard:latest

      # 🔹 Stream Producer
      - name: Build & push stream producer
        if: steps.changes.outputs.stream != ''
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/stream-producer:latest \
                       -f docker/stream_producer/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/stream-producer:latest

      # 🔹 Spark
      - name: Build & push spark
        if: steps.changes.outputs.spark != ''
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/crypto-spark:latest \
                       -f docker/spark/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/crypto-spark:latest