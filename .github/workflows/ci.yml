# .github/workflows/ci.yml

name: CI - Build & Push Images

on:
  push:
    branches: [ "main" ]
    paths:
      - "api/**"
      - "configs/**"
      - "dashboard/**"
      - "docker/**"
      - "docker-compose.yml"
      - "models/**"
      - "pipelines/**"
      - "render_api/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔍 Detect which images need rebuilding
      - name: Get changed files
        id: changes
        run: |
          set -e

          mark_change() {
            local name="$1"
            local value="$2"
            echo "${name}=${value}" >> "$GITHUB_OUTPUT"
          }

          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "First commit or unknown base → rebuild all images"

            mark_change api true
            mark_change dashboard true
            mark_change stream true
            mark_change spark true
          else
            CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")

            echo "Changed files:"
            echo "$CHANGED"

            if echo "$CHANGED" | grep -Eq '^docker/api/'; then
              mark_change api true
            else
              mark_change api false
            fi

            if echo "$CHANGED" | grep -Eq '^(dashboard/|configs/|docker/dashboard/)'; then
              mark_change dashboard true
            else
              mark_change dashboard false
            fi

            if echo "$CHANGED" | grep -Eq '^docker/stream_producer/'; then
              mark_change stream true
            else
              mark_change stream false
            fi

            if echo "$CHANGED" | grep -Eq '^docker/spark/'; then
              mark_change spark true
            else
              mark_change spark false
            fi
          fi

      # 🔐 Login only if needed
      - name: Login to Docker Hub
        if: |
          steps.changes.outputs.api == 'true' ||
          steps.changes.outputs.dashboard == 'true' ||
          steps.changes.outputs.stream == 'true' ||
          steps.changes.outputs.spark == 'true'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔹 API
      - name: Build & push API
        if: steps.changes.outputs.api == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/crypto-api:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/crypto-api:${{ github.sha }} \
                       -f docker/api/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/crypto-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/crypto-api:${{ github.sha }}

      # 🔹 Dashboard
      - name: Build & push dashboard
        if: steps.changes.outputs.dashboard == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/crypto-dashboard:latest \
                       -f docker/dashboard/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/crypto-dashboard:latest

      # 🔹 Stream Producer
      - name: Build & push stream producer
        if: steps.changes.outputs.stream == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/stream-producer:latest \
                       -f docker/stream_producer/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/stream-producer:latest

      # 🔹 Spark
      - name: Build & push spark
        if: steps.changes.outputs.spark == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/crypto-spark:latest \
                       -f docker/spark/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/crypto-spark:latest